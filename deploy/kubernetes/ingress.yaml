apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sts-delegate-rs
  namespace: sts-delegate-rs
  labels:
    app.kubernetes.io/name: sts-delegate-rs
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - sts-delegate.invalid
      secretName: sts-delegate-rs-tls
  rules:
    - host: sts-delegate.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sts-delegate-rs
                port:
                  name: http

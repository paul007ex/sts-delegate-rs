name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  OPENSSL_35_VERSION: 3.5.7
  OPENSSL_35_SHA256: a8c0d28a529ca480f9f36cf5792e2cd21984552a3c8e4aa11a24aa31aeac98e8

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Secure Rust audit loop
        run: python3 scripts/security_audit_loop.py

      - name: Workspace tests
        run: cargo test --workspace

      - name: Install OpenSSL 3.5 for PQC all-features gates
        run: |
          set -euo pipefail
          OPENSSL_INSTALL_DIR="$RUNNER_TEMP/openssl-${OPENSSL_35_VERSION}-install"
          cd "$RUNNER_TEMP"
          curl -fsSLO "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_35_VERSION}/openssl-${OPENSSL_35_VERSION}.tar.gz"
          echo "${OPENSSL_35_SHA256} *openssl-${OPENSSL_35_VERSION}.tar.gz" | sha256sum -c -
          tar -xzf "openssl-${OPENSSL_35_VERSION}.tar.gz"
          cd "openssl-${OPENSSL_35_VERSION}"
          ./config no-shared no-tests "--prefix=$OPENSSL_INSTALL_DIR"
          make -j"$(nproc)"
          make install_sw
          {
            echo "OPENSSL_DIR=$OPENSSL_INSTALL_DIR"
            echo "OPENSSL_STATIC=1"
            echo "PKG_CONFIG_PATH=$OPENSSL_INSTALL_DIR/lib64/pkgconfig:$OPENSSL_INSTALL_DIR/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "LD_LIBRARY_PATH=$OPENSSL_INSTALL_DIR/lib64:$OPENSSL_INSTALL_DIR/lib:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Workspace all-features tests
        run: cargo test --workspace --all-features

      - name: Workspace all-features clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

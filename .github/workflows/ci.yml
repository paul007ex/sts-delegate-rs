name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Secure Rust audit loop
        run: python3 scripts/security_audit_loop.py

      - name: Workspace tests
        run: cargo test --workspace

      - name: Workspace tests with experimental feature gates
        run: |
          openssl version
          version="$(openssl version | awk '{print $2}')"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          if [ "$major" -lt 3 ] || { [ "$major" -eq 3 ] && [ "$minor" -lt 5 ]; }; then
            echo "::notice::Skipping pqc-openssl-unstable tests because OpenSSL $version is older than 3.5"
            exit 0
          fi
          cargo test --workspace --all-features
